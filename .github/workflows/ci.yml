name: OSService CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@3951f0dfe7a07e2313ec93c75700083e2005cbab # v4.0.1
        with:
          dotnet-version: '10.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Install JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.2.2
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Restore
        run: dotnet restore FiapOficina.OSService.slnx

      - name: Sonar Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORG: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          dotnet-sonarscanner begin /k:"LeonardoGiacomozzi_OSService" \
            /o:"$SONAR_ORG" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

      - name: Build
        run: dotnet build FiapOficina.OSService.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FiapOficina.OSService.slnx --configuration Release --no-build --collect:"XPlat Code Coverage;Format=opencover" --results-directory ./TestResults -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[FiapOficina.Contracts]*,[FiapOficina.ServiceDefaults]*,[*]Microsoft.AspNetCore.OpenApi.Generated*,[*]System.Runtime.CompilerServices*"

      - name: Sonar End
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"
